services:
    postgres:
        image: postgres:16-alpine
        container_name: supporthub-postgres
        restart: unless-stopped
        env_file:
            - .env
        ports:
            - '5432:5432'
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-supporthub}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U postgres -d supporthub',
                ]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres_data:
